<div class="card">
<h1>Add Library Inventory</h1>
<p>This page adds the library and furniture items into the live Home Sale Tracker. It checks for matching names first so the items are not duplicated.</p>
<button class="btn" id="addBtn" onclick="addLibraryItems()">Add Items to Tracker</button>
<div class="status" id="status">Ready.</div>
<div class="list" id="preview"></div>
</div>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script>
var FIREBASE_CONFIG={apiKey:"AIzaSyDsITtcbh7nbvn91D96ggfBZQzthUeUmuE",authDomain:"estate-sale-edb3d.firebaseapp.com",databaseURL:"https://estate-sale-edb3d-default-rtdb.firebaseio.com",projectId:"estate-sale-edb3d",storageBucket:"estate-sale-edb3d.firebasestorage.app",messagingSenderId:"825981563204",appId:"1:825981563204:web:461b7100234e9e5814a711"};
firebase.initializeApp(FIREBASE_CONFIG);var db=firebase.database();
var libraryItems=[
{name:'Premium Theology & Ministry Reference Library',category:'Books & Media',room:'Office',phase:'Phase 1',status:'Available',platform:'',shipping:'No',askingPrice:'1200',soldPrice:'',notes:'Pastor theological library lot. Includes Spurgeon Expository Encyclopedia, Hodge Systematic Theology, Barnes Notes, Complete Biblical Library volumes, Bible dictionaries, study Bibles, Greek resources, Pentecostal theology, and ministry references. Target sale around $850; quick sale $500-$700.',photo:''},
{name:'Leadership & Business Library',category:'Books & Media',room:'Office',phase:'Phase 1',status:'Available',platform:'',shipping:'No',askingPrice:'350',soldPrice:'',notes:'Leadership, business, Six Sigma, project management, organizational culture, and professional development library. Target sale around $250; quick sale $100-$150.',photo:''},
{name:'Christian Living & Devotional Library',category:'Books & Media',room:'Office',phase:'Phase 1',status:'Available',platform:'',shipping:'No',askingPrice:'300',soldPrice:'',notes:'Christian living, devotional, religious quotation, humor, children’s, general ministry, and miscellaneous book collection. Target sale around $200; quick sale $75-$125.',photo:''},
{name:'White Lighted Book Cabinet',category:'Furniture',room:'Office',phase:'Phase 1',status:'Available',platform:'',shipping:'No',askingPrice:'200',soldPrice:'',notes:'White lighted cabinet/bookcase associated with ministry library. Expected sale $100-$150.',photo:''},
{name:'Dark Wood Bookcase',category:'Furniture',room:'Office',phase:'Phase 1',status:'Available',platform:'',shipping:'No',askingPrice:'150',soldPrice:'',notes:'Dark wood bookcase associated with library collection. Expected sale $75-$125.',photo:''},
{name:'Curio Cabinet with Glass Doors',category:'Furniture',room:'Office',phase:'Phase 1',status:'Available',platform:'',shipping:'No',askingPrice:'350',soldPrice:'',notes:'Large curio cabinet with glass doors. Expected sale $200-$300.',photo:''}
];
function renderPreview(){document.getElementById('preview').innerHTML=libraryItems.map(function(i){return '<div class="item"><strong>'+i.name+'</strong><br><span class="small">Category: '+i.category+' · Asking: $'+i.askingPrice+'</span><br><span class="small">'+i.notes+'</span></div>'}).join('')}
renderPreview();
function addLibraryItems(){var btn=document.getElementById('addBtn');var status=document.getElementById('status');btn.disabled=true;status.textContent='Checking tracker and adding missing items...';db.ref('items').once('value').then(function(snap){var existing=snap.val()||{};var names=Object.values(existing).map(function(i){return String(i.name||'').toLowerCase().trim()});var updates={};var added=0,skipped=0;libraryItems.forEach(function(item,idx){if(names.indexOf(item.name.toLowerCase().trim())>-1){skipped++;return}var id=String(Date.now()+idx);updates[id]=Object.assign({id:id},item);added++});if(!added){status.textContent='No new items added. All library items already appear to be in the tracker.';btn.disabled=false;return}return db.ref('items').update(updates).then(function(){status.textContent='Done. Added '+added+' item(s). Skipped '+skipped+' duplicate(s). You can now open the Home Sale Tracker.';btn.disabled=false})}).catch(function(err){status.textContent='Error: '+err.message;btn.disabled=false})}
</script>

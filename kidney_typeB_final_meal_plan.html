  * { box-sizing: border-box; margin: 0; padding: 0; }
  .container { padding: 1rem 0; }
  .day-tabs { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 1.2rem; }
  .day-tab { padding: 6px 14px; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-secondary); font-size: 13px; cursor: pointer; background: var(--color-background-primary); color: var(--color-text-secondary); transition: all 0.15s; }
  .day-tab.active { background: var(--color-background-secondary); color: var(--color-text-primary); border-color: var(--color-border-primary); font-weight: 500; }
  .meal-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; }
  .meal-card { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 1rem 1.1rem; }
  .meal-label { font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.06em; color: var(--color-text-tertiary); margin-bottom: 6px; }
  .meal-title { font-size: 14px; font-weight: 500; color: var(--color-text-primary); margin-bottom: 8px; }
  .protein-tag { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 99px; margin-bottom: 8px; font-weight: 500; }
  .tag-lamb   { background: #FAECE7; color: #993C1D; }
  .tag-turkey { background: #E1F5EE; color: #0F6E56; }
  .tag-fish   { background: #E6F1FB; color: #185FA5; }
  .tag-egg    { background: #FAEEDA; color: #854F0B; }
  .meal-items { list-style: none; }
  .meal-items li { font-size: 13px; color: var(--color-text-secondary); padding: 2px 0; display: flex; align-items: flex-start; gap: 6px; line-height: 1.5; }
  .meal-items li::before { content: "·"; color: var(--color-text-tertiary); flex-shrink: 0; }
  .tea-bar { margin-top: 1rem; background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 0.75rem 1rem; font-size: 13px; color: var(--color-text-secondary); }
  .tea-bar strong { color: var(--color-text-primary); font-weight: 500; }
  .legend { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 1.1rem; }
  .legend-item { font-size: 12px; color: var(--color-text-secondary); display: flex; align-items: center; gap: 5px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
</style>

<script>
function safeGet(k){try{return localStorage.getItem(k)}catch(e){return null}}
function safeSet(k,v){try{localStorage.setItem(k,v)}catch(e){}}

// Main nav tabs
document.querySelectorAll('.tab').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
    var panel=document.getElementById(btn.dataset.tab);
    if(panel)panel.classList.add('active');
    safeSet('recon-active-tab',btn.dataset.tab);
    window.scrollTo({top:0,behavior:'smooth'});
  });
});

// Phase sub-tabs
document.querySelectorAll('.tab-button').forEach(button=>{
  button.addEventListener('click',()=>{
    var group=button.getAttribute('data-group');
    var target=button.getAttribute('data-tab');
    document.querySelectorAll('.tab-button[data-group="'+group+'"]').forEach(b=>b.classList.remove('active'));
    document.querySelectorAll('.tab-panel[data-group="'+group+'"]').forEach(p=>p.classList.remove('active'));
    button.classList.add('active');
    var el=document.getElementById(target);
    if(el)el.classList.add('active');
  });
});

function updateTotals(){
  var checks=[...document.querySelectorAll('input[type="checkbox"]')];
  var checked=0;
  checks.forEach(c=>{
    var row=c.closest('.item');
    if(c.checked){checked++;if(row)row.classList.add('done');}
    else if(row)row.classList.remove('done');
  });
  document.getElementById('checkedCount').textContent=checked;
  document.getElementById('totalCount').textContent=checks.length;
  document.getElementById('progressPct').textContent=(checks.length?Math.round(checked/checks.length*100):0)+'%';
  var cities=["Hua Hin","Pattaya/Jomtien","Bangkok outskirts"];
  var scoreCats=["Calm","Convenience","Housing fit","Healthcare access","Grocery access","Road stress","Noise","Wife-fit","Cost-value","Could I do ordinary life here?"];
  cities.forEach(city=>{
    var total=0;
    scoreCats.forEach(cat=>{
      var el=document.getElementById('score-'+city+'-'+cat);
      if(el){total+=Number(el.value||0);safeSet('score-'+city+'-'+cat,el.value||0);}
    });
    var tot=document.getElementById('total-'+city);
    if(tot)tot.textContent='· Total '+total;
  });
}

document.querySelectorAll('input[type="checkbox"]').forEach(c=>{
  var saved=safeGet('check-'+c.id);
  c.checked=saved==='1';
  c.addEventListener('change',()=>{safeSet('check-'+c.id,c.checked?'1':'0');updateTotals();});
});

var cities=["Hua Hin","Pattaya/Jomtien","Bangkok outskirts"];
var scoreCats=["Calm","Convenience","Housing fit","Healthcare access","Grocery access","Road stress","Noise","Wife-fit","Cost-value","Could I do ordinary life here?"];
cities.forEach(city=>{
  scoreCats.forEach(cat=>{
    var el=document.getElementById('score-'+city+'-'+cat);
    if(el){var saved=safeGet('score-'+city+'-'+cat);if(saved!==null)el.value=saved;el.addEventListener('input',updateTotals);}
  });
});

function fmtUSD(n){return'$'+Number(n||0).toFixed(2);}
function fmtTHB(n){return'฿'+Number(n||0).toFixed(2);}

function updateFX(from){
  var rateEl=document.getElementById('fxRate');
  var thbEl=document.getElementById('thbInput');
  var usdEl=document.getElementById('usdInput');
  if(!rateEl||!thbEl||!usdEl)return;
  var rate=Number(rateEl.value||0);if(!rate||rate<=0)rate=36.5;
  if(from==='thb'){var thb=Number(thbEl.value||0);usdEl.value=thb?(thb/rate).toFixed(2):'';}
  else if(from==='usd'){var usd=Number(usdEl.value||0);thbEl.value=usd?(usd*rate).toFixed(2):'';}
  var thb=Number(thbEl.value||0);var usd=Number(usdEl.value||0);
  document.getElementById('thbToUsd').textContent=fmtUSD(thb/rate);
  document.getElementById('usdToThb').textContent=fmtTHB(usd*rate);
  safeSet('fx-rate',rateEl.value);safeSet('fx-thb',thbEl.value);safeSet('fx-usd',usdEl.value);
}

function updateArea(from){
  var sqmEl=document.getElementById('sqmInput');
  var sqftEl=document.getElementById('sqftInput');
  if(!sqmEl||!sqftEl)return;
  if(from==='sqm'){var sqm=Number(sqmEl.value||0);sqftEl.value=sqm?(sqm*10.7639).toFixed(2):'';}
  else if(from==='sqft'){var sqft=Number(sqftEl.value||0);sqmEl.value=sqft?(sqft/10.7639).toFixed(2):'';}
  var sqm=Number(sqmEl.value||0);var sqft=Number(sqftEl.value||0);
  document.getElementById('sqmToSqft').textContent=(sqm*10.7639).toFixed(2)+' sq ft';
  document.getElementById('sqftToSqm').textContent=(sqft/10.7639).toFixed(2)+' sqm';
  safeSet('area-sqm',sqmEl.value);safeSet('area-sqft',sqftEl.value);
}

var savedTab=safeGet('recon-active-tab');
if(savedTab&&document.getElementById(savedTab)){
  document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('active',b.dataset.tab===savedTab));
  document.querySelectorAll('.panel').forEach(p=>p.classList.toggle('active',p.id===savedTab));
}

var fxRate=document.getElementById('fxRate');
var thbInput=document.getElementById('thbInput');
var usdInput=document.getElementById('usdInput');
if(fxRate&&thbInput&&usdInput){
  fxRate.value=safeGet('fx-rate')||'36.50';
  thbInput.value=safeGet('fx-thb')||'';
  usdInput.value=safeGet('fx-usd')||'';
  fxRate.addEventListener('input',()=>updateFX());
  thbInput.addEventListener('input',()=>updateFX('thb'));
  usdInput.addEventListener('input',()=>updateFX('usd'));
}

var sqmInput=document.getElementById('sqmInput');
var sqftInput=document.getElementById('sqftInput');
if(sqmInput&&sqftInput){
  sqmInput.value=safeGet('area-sqm')||'';
  sqftInput.value=safeGet('area-sqft')||'';
  sqmInput.addEventListener('input',()=>updateArea('sqm'));
  sqftInput.addEventListener('input',()=>updateArea('sqft'));
}

var notesBox=document.getElementById('notesBox');
if(notesBox){notesBox.value=safeGet('recon-notes')||'';notesBox.addEventListener('input',()=>safeSet('recon-notes',notesBox.value));}

updateFX();updateArea();updateTotals();
</script>

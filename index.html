<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Working Notes</title>
  <style>
    :root{
      --bg:#071124;
      --card:#0b1730;
      --line:#223257;
      --text:#eef2ff;
      --muted:#c8d0e6;
      --soft:#04102a;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:Arial, Helvetica, sans-serif;
      background:linear-gradient(180deg,#06101f 0%, #0a1730 100%);
      color:var(--text);
      padding:0;
    }
    .topnav{
      padding:14px 18px;
      background:#101b38;
      border-bottom:1px solid #2b3c67;
      font-family:Arial, Helvetica, sans-serif;
    }
    .topnav a{
      color:#cbd4ec;
      text-decoration:none;
      margin-right:18px;
      font-weight:600;
    }
    .topnav a.active{
      color:#eef2ff;
      font-weight:800;
    }
    .wrap{
      max-width:1100px;
      margin:0 auto;
      padding:24px;
    }
    .card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:28px;
      padding:28px;
      box-shadow:0 10px 28px rgba(0,0,0,.28);
    }
    h1{
      margin:0 0 18px;
      font-size:64px;
      line-height:1.05;
      font-weight:800;
      letter-spacing:-1px;
    }
    .sub{
      color:var(--muted);
      font-size:28px;
      line-height:1.45;
      font-weight:700;
      margin-bottom:28px;
      max-width:950px;
    }
    textarea{
      width:100%;
      min-height:520px;
      background:var(--soft);
      color:var(--text);
      border:2px solid #31457a;
      border-radius:28px;
      padding:28px;
      font:inherit;
      font-size:28px;
      line-height:1.5;
      resize:vertical;
      outline:none;
    }
    textarea::placeholder{
      color:#d6dcef;
      opacity:1;
      font-weight:700;
    }
    .toolbar{
      display:flex;
      gap:12px;
      flex-wrap:wrap;
      margin-top:18px;
    }
    button{
      border:1px solid #31457a;
      background:#132247;
      color:#eef2ff;
      padding:12px 18px;
      border-radius:14px;
      cursor:pointer;
      font-size:16px;
      font-weight:700;
    }
    button:hover{
      background:#1a2d5e;
    }
    .note{
      color:#aeb8d4;
      font-size:14px;
      margin-top:14px;
      line-height:1.5;
    }
    @media (max-width: 900px){
      .wrap{padding:14px}
      .card{padding:18px;border-radius:22px}
      h1{font-size:38px}
      .sub{font-size:22px;line-height:1.4}
      textarea{
        min-height:420px;
        font-size:22px;
        padding:20px;
        border-radius:22px;
      }
    }
  </style>
</head>
<body>
  <div class="topnav">
    <a href="/" class="active">Notes</a>
    <a href="/packing-list.html">Packing</a>
    <a href="/relocationfinal.html">Thailand Recon</a>
    <a href="/thailand-recon-planner.html">Recon Planner App</a>
    <a href="/theoeducation.html">Theo Education</a>
  </div>

  <div class="wrap">
    <div class="card">
      <h1>Working Notes</h1>

      <div class="sub">
        Track addresses, agents, rent, road feel, flood concerns, grocery distance, wife-fit observations, and final rankings.
      </div>

      <textarea id="notesBox" placeholder="Type notes here..."></textarea>

      <div class="toolbar">
        <button onclick="copyNotes()">Copy Notes</button>
        <button onclick="clearNotes()">Clear Notes</button>
      </div>

      <div class="note">
        Notes save in this browser on this device.
      </div>
    </div>
  </div>

  <script>
    const notesBox = document.getElementById('notesBox');

    try {
      notesBox.value = localStorage.getItem('site-notes') || '';
      notesBox.addEventListener('input', () => {
        localStorage.setItem('site-notes', notesBox.value);
      });
    } catch(e) {}

    function copyNotes(){
      notesBox.select();
      notesBox.setSelectionRange(0, 999999);
      try {
        document.execCommand('copy');
      } catch(e) {}
    }

    function clearNotes(){
      notesBox.value = '';
      try {
        localStorage.setItem('site-notes', '');
      } catch(e) {}
    }
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gregory Trent Tools</title>
  <style>
    :root{
      --bg:#0b1020;
      --card:#131a2b;
      --line:#2b3650;
      --text:#eef2ff;
      --muted:#b8c1d9;
      --accent:#7c5cff;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:Arial, Helvetica, sans-serif;
      background:linear-gradient(180deg,#08101d 0%, #11192b 100%);
      color:var(--text);
      padding:24px;
    }
    .wrap{max-width:900px;margin:0 auto}
    h1{margin:0 0 10px;font-size:32px}
    .sub{color:var(--muted);margin-bottom:24px;line-height:1.5}
    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
      gap:18px;
    }
    .card{
      display:block;
      text-decoration:none;
      color:var(--text);
      background:var(--card);
      border:1px solid var(--line);
      border-radius:18px;
      padding:18px;
      transition:.15s ease;
    }
    .card:hover{transform:translateY(-2px);border-color:var(--accent)}
    .card h2{margin:0 0 8px;font-size:22px}
    .card p{margin:0;color:var(--muted);line-height:1.5}
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Gregory Trent Tools</h1>
    <div class="sub">Mobile-friendly hub for your planning tools.</div>

    <div class="grid">
      <a class="card" href="/packing-list.html">
        <h2>Packing Checklist</h2>
        <p>Open the packing checklist with tabs, progress, and saved checkoffs.</p>
      </a>

      <a class="card" href="/relocationfinal.html">
        <h2>Thailand Recon</h2>
        <p>Open your Thailand recon planner, scoring, notes, and itinerary.</p>
      </a>

      <a class="card" href="/theoeducation.html">
        <h2>Theo Education</h2>
        <p>Open your theology and education page.</p>
      </a>
    </div>
  </div>
</body>
</html>
